name: Migrate & Deploy

on:
  push:
    branches: [main]

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API deps
        run: npm ci
        working-directory: api

      - name: Write Supabase CA certificate
        run: echo "${{ secrets.SUPABASE_CA_CERT }}" | base64 -d > /tmp/supabase-ca.crt

      - name: Run database migrations
        run: npm run db:migrate
        working-directory: api
        env:
          PGHOST:        ${{ secrets.PGHOST }}
          PGPORT:        5432
          PGUSER:        ${{ secrets.PGUSER }}
          PGPASSWORD:    ${{ secrets.PGPASSWORD }}
          PGDATABASE:    postgres
          PGSSLROOTCERT: /tmp/supabase-ca.crt

      - name: Deploy API to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: api
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Deploy frontend to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
